rules:
  - id: custom-rule-enforce-secure-cookies
    patterns:
      - pattern: $RESP.set_cookie(...)
      - pattern-not: $RESP.set_cookie(..., secure=True, ...)
      - pattern-not: $RESP.set_cookie(..., httponly=True, ...)
    message: |
      Insecure Cookie Management Detected! 
      All cookies must be set with `secure=True` and `httponly=True` to prevent 
      XSS extraction and plaintext network interception.
    severity: ERROR
    languages:
      - python

  - id: custom-rule-hardcoded-secret-variable
    patterns:
    
      - pattern: $VAR = "..."
      
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i).*(key|secret|token|api|auth|password|cred|pass|private|access).*
          
      - pattern-not: $VAR = ""  
      - pattern-not: $VAR = "https://..."
      
    message: |
      Potential hardcoded credential found in variable '$VAR'. 
      Storing secrets in source code violates secure SDLC practices. 
      Use environment variables or a secret management service.
    severity: ERROR
    languages:
      - python