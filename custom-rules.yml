rules:
  - id: custom-enforce-secure-cookies-rule
    patterns:
      - pattern: $RESP.set_cookie(...)
      - pattern-not: $RESP.set_cookie(..., secure=True, ...)
      - pattern-not: $RESP.set_cookie(..., httponly=True, ...)
    message: |
      Insecure Cookie Management Detected! 
      All cookies must be set with `secure=True` and `httponly=True` to prevent 
      XSS extraction and plaintext network interception.
    severity: ERROR
    languages:
      - python

  - id: custom-hardcoded-secrets-scan-rule
    patterns:
      - pattern-either:
          - pattern: app.$PROP = "..."
          - pattern: app.config["$PROP"] = "..."
          
      - metavariable-regex:
          metavariable: $PROP
          regex: (?i).*(key|secret|api).*
          
    message: |
      Hardcoded sensitive credential detected. 
      The property '$PROP' matches restricted keywords (key, secret, api). 
      Values must be loaded dynamically (e.g., os.environ.get('$PROP')).
    severity: ERROR
    languages:
      - python